<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader — Загрузчик Видео</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            user-select: none;
        }
        .drag-region {
            -webkit-app-region: drag;
        }
        .no-drag {
            -webkit-app-region: no-drag;
        }
        .progress-bar {
            transition: width 0.3s ease-out;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col overflow-hidden">

    <!-- Заголовок окна -->
    <header class="drag-region bg-slate-800 h-10 flex items-center justify-between px-4 border-b border-slate-700">
        <div class="flex items-center space-x-2">
            <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10"></path>
            </svg>
            <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Downloader</span>
        </div>
        <div class="no-drag flex space-x-1">
            <button id="minimize-btn" class="p-1 hover:bg-slate-700 rounded-md transition-colors text-slate-400 hover:text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 12H4" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
            <button id="close-btn" class="p-1 hover:bg-red-500 rounded-md transition-colors text-slate-400 hover:text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="flex-1 p-6 overflow-y-auto">
        <div class="max-w-3xl mx-auto space-y-6">
            
            <!-- Статус инструментов -->
            <div class="flex space-x-4">
                <div id="status-ffmpeg" class="bg-slate-800 px-3 py-1.5 rounded-full text-xs font-medium flex items-center space-x-2 border border-slate-700">
                    <span class="w-2 h-2 rounded-full bg-slate-500 indicator"></span>
                    <span>FFmpeg</span>
                </div>
                <div id="status-aria2c" class="bg-slate-800 px-3 py-1.5 rounded-full text-xs font-medium flex items-center space-x-2 border border-slate-700">
                    <span class="w-2 h-2 rounded-full bg-slate-500 indicator"></span>
                    <span>Aria2c</span>
                </div>
                <div id="status-ytdlp" class="bg-slate-800 px-3 py-1.5 rounded-full text-xs font-medium flex items-center space-x-2 border border-slate-700">
                    <span class="w-2 h-2 rounded-full bg-slate-500 indicator"></span>
                    <span>yt-dlp</span>
                </div>
            </div>

            <!-- Карточка ввода -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Ссылка на видео / поток</label>
                        <input type="text" id="url-input" placeholder="https://..." 
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Название файла (необязательно)</label>
                        <input type="text" id="name-input" placeholder="Мое_видео" 
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Браузер для Cookies</label>
                        <select id="browser-select" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all cursor-pointer">
                            <option value="none">Не использовать</option>
                            <option value="chrome">Chrome</option>
                            <option value="firefox">Firefox</option>
                            <option value="edge">Edge</option>
                            <option value="opera">Opera</option>
                            <option value="safari">Safari</option>
                        </select>
                    </div>
                    <div class="flex items-end pb-3">
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <div class="relative">
                                <input type="checkbox" id="turbo-mode" class="sr-only peer">
                                <div class="w-10 h-6 bg-slate-700 rounded-full peer peer-checked:bg-indigo-600 transition-colors"></div>
                                <div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform peer-checked:translate-x-4"></div>
                            </div>
                            <span class="text-sm font-medium text-slate-300 group-hover:text-white transition-colors">Турбо-режим (Aria2c)</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Папка для сохранения</label>
                    <div class="flex space-x-2">
                        <div id="path-display" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-slate-400 text-sm truncate">
                            Папка не выбрна...
                        </div>
                        <button id="select-folder-btn" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                            Обзор
                        </button>
                    </div>
                </div>

                <button id="start-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-500/20 transform active:scale-[0.98] transition-all">
                    НАЧАТЬ ЗАГРУЗКУ
                </button>
            </div>

            <!-- Прогресс (скрыт по умолчанию) -->
            <div id="progress-container" class="hidden bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl space-y-4">
                <div class="flex justify-between items-end">
                    <div>
                        <span class="text-2xl font-bold text-white" id="progress-percent">0%</span>
                    </div>
                    <div>
                        <button id="stop-btn" class="bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 border border-rose-500/50 px-3 py-1 rounded text-xs font-bold transition-all">
                            ОСТАНОВИТЬ
                        </button>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-slate-400 uppercase font-bold tracking-widest">Скорость</div>
                        <div class="text-lg font-medium text-indigo-400" id="speed-display">0.00 MiB/s</div>
                    </div>
                </div>
                
                <div class="w-full bg-slate-900 rounded-full h-3 overflow-hidden border border-slate-700">
                    <div id="progress-bar-fill" class="progress-bar bg-indigo-500 h-full w-0 shadow-[0_0_10px_rgba(99,102,241,0.5)]"></div>
                </div>

                <div id="status-text" class="text-center text-sm text-slate-400 italic">
                    Подготовка к загрузке...
                </div>
            </div>

        </div>
    </main>

    <!-- Уведомления (Toasts) -->
    <div id="toast" class="fixed bottom-8 right-8 flex items-center p-4 mb-4 text-slate-100 bg-slate-800 rounded-lg shadow-2xl border border-slate-700 transform translate-y-24 transition-transform duration-300 z-50">
        <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg" id="toast-icon"></div>
        <div class="ml-3 text-sm font-medium" id="toast-message"></div>
    </div>

    <!-- Логика UI -->
    <script src="renderer.js"></script>
</body>
</html>
